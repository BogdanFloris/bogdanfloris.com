{% extends "base.html" %}
{% block title %}{{ meta.page_title }}{% endblock %}
{% block body %}
    {% include "partials/theme-button.html" %}
    <div class="min-h-screen px-4 sm:px-6 py-16">
        <div class="max-w-2xl mx-auto">
            {% include "partials/banner.html" %}
            {% include "partials/nav.html" %}
            <article class="bg-bg-h-light dark:bg-bg-h-dark border-fg-light dark:border-fg-dark border-1-5 px-6 sm:px-8 py-6 mb-12">
                <h1 class="text-2xl font-bold mb-2">{{ title }}</h1>
                <p class="text-fg-light-4 dark:text-fg-dark-4 text-sm mb-6">{{ date }}</p>
                {{ rendered_html|safe }}
            </article>
        </div>
    </div>
{% endblock %}
